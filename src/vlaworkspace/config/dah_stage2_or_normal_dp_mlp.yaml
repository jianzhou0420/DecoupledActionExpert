seed: 42

# =============================================================================
# DAH Stage 2: Train vision encoder with frozen action head (MLP/DP_MLP)
# Loads stage1 checkpoint, freezes action head, trains only vision encoder.
# =============================================================================

train_mode: stage2
ckpt_path: null  # Override from CLI: ckpt_path=path/to/stage1.ckpt
using_transformers: false  # DP_MLP stage2 uses standard AdamW, not transformer optimizer

batch_size: 64

# Temporal settings (Stage 2)
horizon: 16
n_obs_steps: 2
n_action_steps: 8
n_latency_steps: 0

# =============================================================================
# Task Configuration (Stage 2: full observations with images)
# =============================================================================
task_name: dah_stage2_dp_mlp

IO_meta:
  shape_meta:
    obs:
      agentview_image:
        shape: [3, 84, 84]
        type: rgb
      robot0_eye_in_hand_image:
        shape: [3, 84, 84]
        type: rgb
      robot0_eef_pos:
        shape: [3]
        type: low_dim
      robot0_eef_quat:
        shape: [4]
        type: low_dim
      robot0_gripper_qpos:
        shape: [2]
        type: low_dim
    action:
      shape: [10]
  slice_meta:
    horizon: 16
    n_obs_steps: 2
    n_action_steps: 8
    n_latency_steps: 0

dataset:
  _target_: vlaworkspace.dataset.create_lerobot_dataset
  repo_id: "JianZhou0420/DAH_mimicgen_stack_d1_alldemos"
  n_horizon: 16
  n_obs: 2
  n_latency: 0

# =============================================================================
# Adaptor Configuration (Stage 2: full images + state)
# =============================================================================
adaptor:
  _target_: vlaworkspace.adaptors.Adaptor
  robot:
    _target_: vlaworkspace.adaptors.robots.MimicGenRobot
  model:
    _target_: vlaworkspace.adaptors.models.DPModel
    norm_stats_path: "auto"
    n_obs_steps: 2
    crop_shape: [76, 76]

# =============================================================================
# Norm Stats Computation
# =============================================================================
norm_stats_batch_size: 64
norm_stats_num_workers: 8
norm_stats_output_dir: "assets"
max_frames: null

# =============================================================================
# Policy Configuration (DP_MLP)
# =============================================================================
policy:
  _target_: vlaworkspace.policy.dah_dp_mlp.DiffusionMLPHybridImagePolicy

  shape_meta: ${IO_meta.shape_meta}

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    variance_type: fixed_small
    clip_sample: true
    prediction_type: epsilon

  horizon: ${horizon}
  n_action_steps: ${n_action_steps}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 100
  crop_shape: [76, 76]
  obs_encoder_group_norm: true

  n_layer: 8
  n_cond_layers: 0
  n_head: 4
  n_emb: 256
  p_drop_emb: 0.0
  p_drop_attn: 0.1
  causal_attn: true
  time_as_cond: true
  obs_as_cond: true
  parallel_input_emb: true

  skip_normalization: true

# =============================================================================
# EMA
# =============================================================================
ema:
  _target_: vlaworkspace.model.DecoupledActionHead.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

# =============================================================================
# DataLoader
# =============================================================================
dataloader:
  batch_size: ${batch_size}
  num_workers: 16
  shuffle: true
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  use_episode_aware_sampler: true

val_dataloader:
  batch_size: ${batch_size}
  num_workers: 4
  shuffle: false
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2

# =============================================================================
# Optimizer (DP_MLP uses split weight decay like other transformer policies)
# =============================================================================
optimizer:
  transformer_weight_decay: 1.0e-3
  obs_encoder_weight_decay: 1.0e-6
  learning_rate: 1.0e-4
  betas: [0.95, 0.999]

# =============================================================================
# Environment Runner (for rollout evaluation during training)
# =============================================================================
# Activated when train_mode=stage2_rollout. Requires robomimic HDF5 dataset.
# Override from CLI: env_runner.dataset_path=... env_runner.max_steps=...
env_runner:
  _target_: vlaworkspace.env_runner.robomimic_runner.RobomimicRunner
  dataset_path: null    # Override: data/robomimic/datasets/{task}/{task}_abs_traj_eePose.hdf5
  shape_meta: ${IO_meta.shape_meta}
  n_train: 6
  n_train_vis: 2
  train_start_idx: 0
  n_test: 50
  n_test_vis: 4
  test_start_seed: 100000
  max_steps: 400        # Override per task (average_steps * 2.5)
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  render_obs_key: "agentview_image"
  fps: 10
  crf: 22
  past_action: false
  abs_action: true
  tqdm_interval_sec: 1.0
  n_envs: 28

# =============================================================================
# Logging
# =============================================================================
run_name: null
run_dir: data/outputs/${run_name}

# =============================================================================
# Training
# =============================================================================
training:
  seed: ${seed}
  debug: false
  resume: false

  strategy: auto
  accelerator: gpu
  precision: "32-true"

  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 50

  gradient_accumulate_every: 1
  gradient_clip_val: null

  use_ema: true
  use_8bit_optimizer: false

  checkpoint_every: 5
  val_every: null


  torch_compile: false
  compile_mode: "reduce-overhead"

# =============================================================================
# Logging (WandB)
# =============================================================================
logging:
  project: dah_stage2
  resume: false
  mode: offline
  name: ${run_name}
  tags: ["dah", "stage2", "dp_mlp"]
  id: null
  group: null
  entity: null
  log_model: false

# =============================================================================
# Hydra
# =============================================================================
hydra:
  job:
    override_dirname: dah_stage2_dp_mlp
  run:
    dir: ${run_dir}
  sweep:
    dir: ${run_dir}
    subdir: ${hydra.job.num}
