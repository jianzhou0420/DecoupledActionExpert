seed: 42
preload: true
preload_path: data/cache/dah_stage1_dp_c_preloaded.pt
cache_in_memory: false

# =============================================================================
# DAH Stage 1: DP_C (Convolutional UNet) — Low-dim only, no images
# =============================================================================

train_mode: stage1
ckpt_path: null
using_transformers: false

batch_size: 64

# Temporal settings (stage1: full horizon for obs + actions)
horizon: 16
n_obs_steps: 16
n_action_steps: 1 # Original: 16 + (-15) = 1 for inference
n_latency_steps: 0

# =============================================================================
# Task Configuration (Stage 1: low-dim only, no images)
# =============================================================================
task_name: dah_stage1_dp_c

IO_meta:
  shape_meta:
    obs:
      robot0_joint_pos:
        shape: [8]
        type: low_dim
    action:
      shape: [10]
  slice_meta:
    horizon: 16
    n_obs_steps: 16
    n_action_steps: 1
    n_latency_steps: 0

dataset:
  _target_: vlaworkspace.dataset.create_lerobot_dataset
  repo_id: "JianZhou0420/DAH_mimicgen_ABCDEFGH_8tasks_alldemos_lowdim"
  n_horizon: 16
  n_obs: 16
  n_latency: 0
  obs_keys: [observation.joint_position, actions]
  action_keys: [observation.eePose]

# =============================================================================
# Adaptor Configuration (Stage 1: JP obs, eePose action target)
# =============================================================================
adaptor:
  _target_: vlaworkspace.adaptors.Adaptor
  robot:
    _target_: vlaworkspace.adaptors.robots.MimicGenStage1Robot
  model:
    _target_: vlaworkspace.adaptors.models.DPStage1Model
    norm_stats_path: "auto"
    n_obs_steps: 16
    crop_shape: null

# =============================================================================
# Norm Stats
# =============================================================================
norm_stats_batch_size: 64
norm_stats_num_workers: 8
norm_stats_output_dir: "assets"
max_frames: null

# Logging
run_name: null
run_dir: data/outputs/${run_name}

# =============================================================================
# Policy Configuration (DP_C)
# =============================================================================
policy:
  _target_: vlaworkspace.policy.dah_dp_c.DiffusionUnetHybridImagePolicy

  shape_meta: ${IO_meta.shape_meta}

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    variance_type: fixed_small
    clip_sample: true
    prediction_type: epsilon

  horizon: ${horizon}
  n_action_steps: ${n_action_steps}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 100

  obs_as_global_cond: true
  crop_shape: null # No images in stage1
  diffusion_step_embed_dim: 128
  down_dims: [512, 1024, 2048]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: true
  obs_encoder_group_norm: true

  skip_normalization: true

# =============================================================================
# EMA
# =============================================================================
ema:
  _target_: vlaworkspace.model.DecoupledActionHead.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

# =============================================================================
# DataLoader
# =============================================================================
dataloader:
  batch_size: ${batch_size}
  num_workers: 0
  shuffle: true
  pin_memory: true
  persistent_workers: false
  use_episode_aware_sampler: true

val_dataloader:
  batch_size: ${batch_size}
  num_workers: 0
  shuffle: false
  pin_memory: true
  persistent_workers: false

# =============================================================================
# Optimizer
# =============================================================================
optimizer:
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

# =============================================================================
# Training
# =============================================================================
training:
  seed: ${seed}
  debug: false
  resume: false

  strategy: auto
  accelerator: gpu
  precision: "32-true"

  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 250 # 50000 / 200

  gradient_accumulate_every: 1
  gradient_clip_val: null

  use_ema: true
  use_8bit_optimizer: false

  checkpoint_every: 10
  val_every: null

  torch_compile: false
  compile_mode: "reduce-overhead"

# =============================================================================
# Logging (WandB)
# =============================================================================
logging:
  project: dah_stage1
  resume: false
  mode: offline
  name: ${run_name}
  tags: ["stage1", "dp_c", "mimicgen"]
  id: null
  group: null
  entity: null
  log_model: false

# =============================================================================
# Hydra
# =============================================================================
hydra:
  job:
    override_dirname: dah_stage1_dp_c
  run:
    dir: ${run_dir}
  sweep:
    dir: ${run_dir}
    subdir: ${hydra.job.num}
