seed: 42
preload: false
preload_path: null
cache_in_memory: false

# =============================================================================
# DAH Stage 1: DROID Diffusion Policy on LIBERO — low-dim only (no images)
# UNet: FiLM scale*x+bias, dims [256,512,1024], dsed=256, DDIM
# Obs: observation.state[8] (pos+quat+grip) → 10D (pos+rot6d+grip)
# Action: actions[7] (dpos+daa+grip) → 10D (dpos+rot6d+grip)
# =============================================================================

train_mode: stage1
ckpt_path: null
using_transformers: false

batch_size: 128

# Temporal settings (stage1: full horizon for obs + actions)
horizon: 16
n_obs_steps: 16
n_action_steps: 1
n_latency_steps: 0

# =============================================================================
# Task Configuration (Stage 1: low-dim only, no images)
# =============================================================================
task_name: dah_stage1_droid_dp_libero

IO_meta:
  shape_meta:
    obs:
      robot0_joint_pos:
        shape: [10]    # pos[3]+rot6d[6]+grip[1] after eepose→rot6d conversion
        type: low_dim
    action:
      shape: [10]      # pos[3]+rot6d[6]+grip[1]
  slice_meta:
    horizon: 16
    n_obs_steps: 16
    n_action_steps: 1
    n_latency_steps: 0

dataset:
  _target_: vlaworkspace.dataset.create_lerobot_dataset
  repo_id: "JianZhou0420/libero_openvla_LeRobotv3_0"
  n_horizon: 16
  n_obs: 16
  n_latency: 0
  obs_keys: [observation.state]
  action_keys: [actions]

# =============================================================================
# Adaptor Configuration (Stage 1: LIBERO eepose obs, delta action target)
# =============================================================================
adaptor:
  _target_: vlaworkspace.adaptors.Adaptor
  robot:
    _target_: vlaworkspace.adaptors.robots.LiberoStage1Robot
    cond_type: eepose
  model:
    _target_: vlaworkspace.adaptors.models.DPStage1Model
    norm_stats_path: "auto"
    n_obs_steps: 16
    crop_shape: null
    cond_type: eepose

# =============================================================================
# Norm Stats
# =============================================================================
norm_stats_batch_size: 64
norm_stats_num_workers: 8
norm_stats_output_dir: "assets"
max_frames: null

# Logging
run_name: null
run_dir: data/outputs/${run_name}

# =============================================================================
# Policy (DROID Diffusion Policy — same UNet as stage 2)
# =============================================================================
policy:
  _target_: vlaworkspace.policy.droid_dp.DroidDiffusionPolicy
  shape_meta: ${IO_meta.shape_meta}
  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddim.DDIMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    clip_sample: true
    prediction_type: epsilon
  horizon: ${horizon}
  n_action_steps: ${n_action_steps}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 10
  diffusion_step_embed_dim: 256
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  obs_encoder_group_norm: true
  skip_normalization: true
  noise_samples: 8
  use_language: false
  crop_shape: null  # No images in stage 1

# =============================================================================
# EMA
# =============================================================================
ema:
  _target_: vlaworkspace.model.DecoupledActionHead.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

# =============================================================================
# DataLoader
# =============================================================================
dataloader:
  batch_size: ${batch_size}
  num_workers: 16
  shuffle: true
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4

val_dataloader:
  batch_size: ${batch_size}
  num_workers: 4
  shuffle: false
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2

# =============================================================================
# Optimizer (Adam — same as droid_dp_libero)
# =============================================================================
optimizer:
  _target_: torch.optim.Adam
  lr: 1.0e-4

# =============================================================================
# Training (epoch-based, cosine LR)
# =============================================================================
training:
  seed: ${seed}
  debug: false
  resume: false

  strategy: auto
  accelerator: gpu
  precision: "32-true"

  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 6
  max_steps: -1

  gradient_accumulate_every: 1
  gradient_clip_val: null

  use_ema: true
  use_8bit_optimizer: false

  checkpoint_every: 1
  val_every: null

  torch_compile: false
  compile_mode: "reduce-overhead"

# =============================================================================
# Logging (WandB)
# =============================================================================
logging:
  project: dah_stage1_droid_dp_libero
  resume: false
  mode: offline
  name: ${run_name}
  tags: ["dah", "stage1", "droid-dp", "libero"]
  id: null
  group: null
  entity: null
  log_model: false

# =============================================================================
# Hydra
# =============================================================================
hydra:
  job:
    override_dirname: dah_stage1_droid_dp_libero
  run:
    dir: ${run_dir}
  sweep:
    dir: ${run_dir}
    subdir: ${hydra.job.num}
