seed: 42
preload: true
preload_path: data/cache/dah_stage1_dp_t_preloaded.pt
cache_in_memory: false

# =============================================================================
# DAH Stage 1: Train diffusion action head (Transformer/DP_T) with low-dim state only
# No images, no vision encoder. Fast action head pre-training.
# =============================================================================

train_mode: stage1
ckpt_path: null
using_transformers: true

batch_size: 64

# Temporal settings (Stage 1: DP_T uses horizon=10)
horizon: 10
n_obs_steps: 10
n_action_steps: 10
n_latency_steps: 0

# =============================================================================
# Task Configuration (Stage 1: low-dim only, no images)
# =============================================================================
task_name: dah_stage1_dp_t

IO_meta:
  shape_meta:
    obs:
      robot0_joint_pos:
        shape: [8]
        type: low_dim
    action:
      shape: [10]

dataset:
  _target_: vlaworkspace.dataset.create_lerobot_dataset
  repo_id: "JianZhou0420/DAH_mimicgen_ABCDEFGH_8tasks_alldemos_lowdim"
  n_horizon: 10
  n_obs: 10
  n_latency: 0
  obs_keys: [observation.joint_position, actions]
  action_keys: [observation.eePose]

# =============================================================================
# Adaptor Configuration (Stage 1: JP obs, eePose action target)
# =============================================================================
adaptor:
  _target_: vlaworkspace.adaptors.Adaptor
  robot:
    _target_: vlaworkspace.adaptors.robots.MimicGenStage1Robot
  model:
    _target_: vlaworkspace.adaptors.models.DPStage1Model
    norm_stats_path: "auto"
    n_obs_steps: 10
    crop_shape: null

# =============================================================================
# Policy Configuration (DP_T - Transformer)
# =============================================================================
policy:
  _target_: vlaworkspace.policy.dah_dp_t.DiffusionTransformerHybridImagePolicy

  shape_meta: ${IO_meta.shape_meta}

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    variance_type: fixed_small
    clip_sample: true
    prediction_type: epsilon

  horizon: ${horizon}
  n_action_steps: ${n_action_steps}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 100
  crop_shape: null # No images in stage 1
  obs_encoder_group_norm: true

  n_layer: 8
  n_cond_layers: 0
  n_head: 4
  n_emb: 256
  p_drop_emb: 0.0
  p_drop_attn: 0.3
  causal_attn: true
  time_as_cond: true
  obs_as_cond: true

  skip_normalization: true

# =============================================================================
# EMA
# =============================================================================
ema:
  _target_: vlaworkspace.model.DecoupledActionHead.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

# =============================================================================
# DataLoader
# =============================================================================
dataloader:
  batch_size: ${batch_size}
  num_workers: 0
  shuffle: true
  pin_memory: true
  persistent_workers: false
  use_episode_aware_sampler: true

val_dataloader:
  batch_size: ${batch_size}
  num_workers: 0
  shuffle: false
  pin_memory: true
  persistent_workers: false

# =============================================================================
# Optimizer (DP_T uses split weight decay)
# =============================================================================
optimizer:
  transformer_weight_decay: 1.0e-3
  obs_encoder_weight_decay: 1.0e-6
  learning_rate: 1.0e-4
  betas: [0.9, 0.95]

# =============================================================================
# Logging
# =============================================================================
run_name: null
run_dir: data/outputs/${run_name}

norm_stats_batch_size: 64
norm_stats_num_workers: 8
norm_stats_output_dir: "assets"
max_frames: null

# =============================================================================
# Training
# =============================================================================
training:
  seed: ${seed}
  debug: false
  resume: false

  strategy: auto
  accelerator: gpu
  precision: "32-true"

  lr_scheduler: cosine
  lr_warmup_steps: 1000
  num_epochs: 250

  gradient_accumulate_every: 1
  gradient_clip_val: null

  use_ema: true
  use_8bit_optimizer: false

  checkpoint_every: 5
  val_every: null

  torch_compile: false
  compile_mode: "reduce-overhead"

# =============================================================================
# Logging (WandB)
# =============================================================================
logging:
  project: dah_stage1
  resume: false
  mode: offline
  name: ${run_name}
  tags: ["dah", "stage1", "dp_t"]
  id: null
  group: null
  entity: null
  log_model: false

# =============================================================================
# Hydra
# =============================================================================
hydra:
  job:
    override_dirname: dah_stage1_dp_t
  run:
    dir: ${run_dir}
  sweep:
    dir: ${run_dir}
    subdir: ${hydra.job.num}
